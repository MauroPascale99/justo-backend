proyecto:
  nombre: JUSTO Pricing 360
  version: 0.3.0-universal
  modo: universal
db:
  # En produccion tipo=postgres y la conexion sale de DATABASE_URL (ver .env).
  # 'path' SOLO se usa como fallback local con tipo=sqlite (desarrollo).
  tipo: postgres
  path: local_data/justo_pricing_local_reference.db
  batch_size: 1000
captura:
  timeout_request: 20
  max_reintentos: 3
  delay_entre_requests: 0.8
  delay_entre_paginas: 1.2
  delay_entre_fuentes: 8.0
  max_productos_por_corrida: 50000
  usar_cache: true
  ttl_cache_minutos: 60
  max_paginas_por_categoria: 800
outputs:
  directorio: outputs
  raw_csv: capturas_raw.csv
  normalizado_csv: capturas_normalizadas.csv
  errores_csv: errores.csv
  exportar_excel: true
logs:
  directorio: logs
  nivel: INFO
  retener_dias: 30
