  retailers: `outputs/clientes/${MP_CONFIG.idCliente}/dashboard_privado_retailers.csv`,
};

function mp_get(row, keys, fallback="") {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return row[k];
  }
  return fallback;
}

function mp_parseNumberAR(value) {
  if (value === null || value === undefined) return 0;

  let s = String(value).trim();
  if (!s) return 0;

  s = s
    .replace(/\$/g, "")
    .replace(/\s/g, "")
    .replace(/ /g, "");

  const hasComma = s.includes(",");
  const hasDot = s.includes(".");

  if (hasComma && hasDot) {
    const lastComma = s.lastIndexOf(",");
    const lastDot = s.lastIndexOf(".");

    // Formato argentino: 2.141,99
    if (lastComma > lastDot) {
      s = s.replace(/\./g, "").replace(",", ".");
    }
    // Formato internacional: 2,141.99
    else {
      s = s.replace(/,/g, "");
    }
  } else if (hasComma && !hasDot) {
    const parts = s.split(",");
    const dec = parts[parts.length - 1] || "";

    // 2141,99 => 2141.99
    if (dec.length > 0 && dec.length <= 2) {
      s = parts.slice(0, -1).join("").replace(/\./g, "") + "." + dec;
    } else {
      s = s.replace(/,/g, "");
    }
  } else if (!hasComma && hasDot) {
    const parts = s.split(".");

    if (parts.length === 2) {
      const intPart = parts[0] || "";
      const decPart = parts[1] || "";

      // 2141.99 => decimal real.
      // 2.141 / 13.499 => separador de miles.
      if (decPart.length === 3 && intPart.length <= 3) {
        s = intPart + decPart;
      } else {
        s = intPart + "." + decPart;
      }
    } else {
      const decPart = parts[parts.length - 1] || "";
      if (decPart.length > 0 && decPart.length <= 2) {
        s = parts.slice(0, -1).join("") + "." + decPart;
      } else {
        s = parts.join("");
      }
    }
  }

  s = s.replace(/[^0-9.\-]/g, "");
  const n = Number(s);
  return Number.isFinite(n) ? n : 0;
}

function mp_parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const n = text[i + 1];
    if (c === '"' && inQuotes && n === '"') { field += '"'; i++; continue; }
    if (c === '"') { inQuotes = !inQuotes; continue; }
    if ((c === ',' || c === ';') && !inQuotes) { row.push(field); field = ""; continue; }
    if ((c === '\n' || c === '\r') && !inQuotes) {
      if (c === '\r' && n === '\n') i++;
      row.push(field); field = "";
      if (row.some(x => String(x).trim() !== "")) rows.push(row);
      row = [];
      continue;
    }
    field += c;
  }
  row.push(field);
  if (row.some(x => String(x).trim() !== "")) rows.push(row);
  if (!rows.length) return [];
  const headers = rows.shift().map(h => String(h).replace(/^\uFEFF/, "").trim());
  return rows.map(r => {
    const o = {};
    headers.forEach((h, i) => o[h] = (r[i] ?? "").trim());
    return o;
  });
}

async function mp_fetchCSV(path) {
  try {
    const res = await fetch(`${path}?v=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) return [];
    const txt = await res.text();
    if (!txt.trim()) return [];
    return mp_parseCSV(txt);
  } catch (e) {
    console.warn("No se pudo leer CSV", path, e);
    return [];
  }
}

function mp_normalizarProducto(row) {
  // Versión agrupada: 1 producto = 1 EAN/clave, con precios por retailer dentro de la misma card.
  const clave = mp_get(row, ["clave_producto", "ean", "id_producto_cliente", "id_producto_fuente", "id"]);
  const ean = mp_get(row, ["ean", "ean_detectado", "EAN"], "");
  const retailersTxt = String(mp_get(row, ["retailers_detectados", "retailers", "retailer"], "")).toLowerCase();
  const retailers = retailersTxt
    .split(",")
    .map(x => x.trim())
    .filter(Boolean);

  const precios = {};              // precio regular por retailer para comparativa
  const preciosActuales = {};       // precio observado / vigente por retailer
  const preciosOferta = {};         // precio oferta por retailer, si existe
  const disponibilidades = {};
  const idsPorRetailer = {};

  MP_CONFIG.retailersHabilitados.forEach(r => {
    // Regla JUSTO: la comparativa principal usa SIEMPRE precio regular.
    // El precio oferta se muestra aparte como badge/dato secundario.
    const regularRaw = mp_get(row, [`precio_regular_${r}`, `precio_${r}`], "");
    const actualRaw = mp_get(row, [`precio_actual_${r}`, `precio_${r}`], "");
    const ofertaRaw = mp_get(row, [`precio_oferta_${r}`], "");

    const precioRegular = mp_parseNumberAR(regularRaw);
    const precioActual = mp_parseNumberAR(actualRaw);
    const precioOferta = mp_parseNumberAR(ofertaRaw);

    if (precioRegular > 0) precios[r] = precioRegular;
    if (precioActual > 0) preciosActuales[r] = precioActual;
    if (precioOferta > 0 && (!precioRegular || precioOferta < precioRegular)) preciosOferta[r] = precioOferta;

    const disp = String(mp_get(row, [`disponibilidad_${r}`], "")).toLowerCase();
    disponibilidades[r] = disp;

    const ids = String(mp_get(row, [`ids_fuente_${r}`], ""))
      .split(",")
      .map(x => x.trim())
      .filter(Boolean);
    if (ids.length) idsPorRetailer[r] = ids;
  });

  const precioMin = mp_parseNumberAR(mp_get(row, ["precio_regular_min", "precio_min"], "0"));
  const precioMax = mp_parseNumberAR(mp_get(row, ["precio_regular_max", "precio_max"], "0"));
  const precioProm = mp_parseNumberAR(mp_get(row, ["precio_regular_promedio", "precio_promedio"], "0"));
  const retailerMin = String(mp_get(row, ["retailer_precio_regular_min", "retailer_precio_min"], "")).toLowerCase().trim();
  const retailerMax = String(mp_get(row, ["retailer_precio_regular_max", "retailer_precio_max"], "")).toLowerCase().trim();
  const idsFuente = String(mp_get(row, ["ids_producto_fuente", "id_producto_fuente"], ""))
    .split(",")
    .map(x => x.trim())
    .filter(Boolean);

  const disponiblesCount = Number(mp_parseNumberAR(mp_get(row, ["cantidad_disponibles"], "0"))) || 0;
  const cantidadRetailers = Number(mp_parseNumberAR(mp_get(row, ["cantidad_retailers"], String(retailers.length)))) || retailers.length;
  const brechaPct = (precioMin > 0 && precioMax > 0 && precioMin !== precioMax) ? ((precioMax / precioMin) - 1) * 100 : 0;

  return {
    id: String(clave || ean || idsFuente[0] || Math.random()),
    claveProducto: String(clave || ean || ""),
    idProductoFuente: idsFuente[0] || "",
    idsProductoFuente: idsFuente,
    idsPorRetailer,
    nombre: mp_get(row, ["nombre_producto", "nombre_original", "producto", "name"], "Producto sin nombre"),
    marca: mp_get(row, ["marca", "marca_original", "brand"], ""),
    ean,
    retailer: retailers[0] || String(mp_get(row, ["retailer"], "")).toLowerCase().trim(),
    retailers,
    categoria: mp_get(row, ["categoria_principal", "categoria_original", "categoria", "category"], ""),
    precio: precioMin || precioProm || 0,
    precioMin,
    precioMax,
    precioProm,
    retailerMin,
    retailerMax,
    brechaPct,
    precios,
    preciosActuales,
    preciosOferta,
    disponibilidades,
    cantidadRetailers,
    disponiblesCount,
    promo: false,
    disponible: disponiblesCount > 0 || Object.keys(precios).length > 0,
    url: mp_get(row, ["url_producto", "url"], ""),
    imagen: mp_get(row, ["url_imagen", "imagen"], ""),
  };
}

function mp_retailerTieneProducto(p, r) {
  if (p.retailers && p.retailers.includes(r)) return true;
  if (p.precios && p.precios[r] > 0) return true;
  if (p.disponibilidades && p.disponibilidades[r]) return true;
  return false;
}

function mp_fmtARS(n) {
  const v = Number(n || 0);
  if (!Number.isFinite(v) || v <= 0) return "—";
  return "$" + v.toLocaleString("es-AR", { minimumFractionDigits: v % 1 ? 2 : 0, maximumFractionDigits: 2 });
}

/* ── API LAYER LOCAL ──
   Importante: el navegador no puede ejecutar Python directamente.
   Para refrescar resultados reales, primero corré:
   python herramientas\buscar_productos_para_cliente.py --id-cliente 1 --q "ecovita" --limit 80
   python herramientas\agrupar_busqueda_mis_productos.py --id-cliente 1
   Luego recargá/refrescá este módulo.
*/
async function mp_buscarProductos(query) {
  const rows = await mp_fetchCSV(MP_PATHS.busqueda);
  const productos = rows.map(mp_normalizarProducto).filter(p => p.id && p.nombre);
  const q = String(query || "").toLowerCase().trim();
  if (!q) return productos;
  return productos.filter(p =>
    p.nombre.toLowerCase().includes(q) ||
    p.marca.toLowerCase().includes(q) ||
    String(p.ean).includes(q) ||
    p.categoria.toLowerCase().includes(q) ||
    p.retailer.toLowerCase().includes(q)
  );
}

async function mp_cargarProductosGuardados() {
  const rows = await mp_fetchCSV(MP_PATHS.productos);
  return rows.map(mp_normalizarProducto).filter(p => p.id && p.nombre);
}

async function mp_agregarProductos(ids, productosSeleccionados=[]) {
  // Visualmente seleccionamos productos agrupados por EAN.
  // Para no perder detalle, el comando copia todos los ids_producto_fuente asociados a esos EANs.
  const idsFuente = productosSeleccionados
    .flatMap(p => p.idsProductoFuente || [p.idProductoFuente || p.id])
    .map(String)
    .filter(Boolean)
    .filter((v, i, a) => a.indexOf(v) === i)
    .join(",");

  const cmd = `python herramientas\\agregar_productos_cliente_seleccionados.py --id-cliente ${MP_CONFIG.idCliente} --ids-producto-fuente "${idsFuente}" --modo-json`;
  try { await navigator.clipboard.writeText(cmd); } catch(e) {}
  return { ok: true, agregados: ids.length, command: cmd };
}

/* ── MAIN MIS PRODUCTOS MODULE ── */
function MisProductosModule() {
  const [resultados, setResultados] = useStateMP([]);
  const [seleccionados, setSeleccionados] = useStateMP(new Set());
  const [guardados, setGuardados] = useStateMP([]);
  const [filtroRetailers, setFiltroRetailers] = useStateMP(new Set(["coto","dia","carrefour"]));
  const [soloDisponibles, setSoloDisponibles] = useStateMP(false);
  const [query, setQuery] = useStateMP("ecovita");
  const [cargando, setCargando] = useStateMP(true);
  const [agregando, setAgregando] = useStateMP(false);
  const [toast, setToast] = useStateMP({ msg:"", type:"success", visible:false });
  const toastTimer = useRefMP(null);

  const showToast = useCallbackMP((msg, type="success") => {
    clearTimeout(toastTimer.current);
    setToast({ msg, type, visible:true });
    toastTimer.current = setTimeout(() => setToast(t=>({...t, visible:false})), 3000);
  }, []);

  useEffectMP(() => {
    let mounted = true;
    mp_cargarProductosGuardados().then(ps => { if (mounted) setGuardados(ps); });
    return () => { mounted = false; };
  }, []);

  const buscarYRenderizar = useCallbackMP(async (q) => {
    setCargando(true);
    const todos = await mp_buscarProductos(q);
    const filtrados = todos.filter(p => {
      if (![...filtroRetailers].some(r => mp_retailerTieneProducto(p, r))) return false;
      if (soloDisponibles && !p.disponible) return false;
      return true;
    });
    setResultados(filtrados);
    setCargando(false);
  }, [filtroRetailers, soloDisponibles]);

  useEffectMP(() => { buscarYRenderizar(query); }, [query, filtroRetailers, soloDisponibles]);

  const toggleProducto = (id) => {
    if (guardados.some(g=>g.id===id)) return;
    setSeleccionados(prev => {
      const next = new Set(prev);
      if (next.has(id)) { next.delete(id); }
      else {
        if (guardados.length + next.size >= MP_CONFIG.limiteProductos) {
          showToast("Límite del plan Starter alcanzado (25 productos).","error"); return prev;
        }
        next.add(id);
      }
      return next;
    });
  };

  const toggleRetailer = (r) => {
    setFiltroRetailers(prev => {
      const next = new Set(prev);
      if (next.has(r)) next.delete(r); else next.add(r);
      return next;
    });
  };

  const agregarSeleccionados = async () => {
    const ids = [...seleccionados];
    if (!ids.length) return;
    setAgregando(true);
    try {
      const productosSeleccionados = resultados.filter(p => ids.includes(p.id));
      await mp_agregarProductos(ids, productosSeleccionados);
      setGuardados(prev => {
        const next = [...prev];
        ids.forEach(id => {
          const p = resultados.find(x=>x.id===id);
          if (p && !next.some(g=>g.id===id)) next.push(p);
        });
        return next;
      });
      setSeleccionados(new Set());
      showToast(`Comando real copiado para agregar ${ids.length} producto${ids.length>1?"s":""}. Ejecutalo en PowerShell y refrescá dashboard.`, "success");
    } catch(e) {
      showToast("Error al agregar. Revisá la conexión.", "error");
    }
    setAgregando(false);
  };

  const removerGuardado = (id) => {
    setGuardados(prev => prev.filter(g=>g.id!==id));
    showToast("Producto eliminado.", "info");
  };

  const setQuickSearch = (q) => setQuery(q);
  const selCount = seleccionados.size;
  const savedCount = guardados.length;
  const atLimit = savedCount >= MP_CONFIG.limiteProductos;

  return (
    <div style={{padding:"24px 32px 120px"}}>
      <MpToast {...toast} />

      {/* ── STEPPER ── */}
      <div style={{
        display:"flex", alignItems:"center", padding:"16px 22px", marginBottom:24,
        borderRadius:"var(--radius-lg)", border:"1px solid var(--border)",
        background:"linear-gradient(135deg,rgba(34,211,238,0.04),rgba(167,139,250,0.03))",
        position:"relative", overflow:"hidden",
      }}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent 0%,rgba(34,211,238,0.5) 33%,transparent 100%)"}}/>
        {[
          {n:1,label:"Paso 1 · Activo",name:"Mis Productos",active:true},
          {n:2,label:"Paso 2 · Pendiente",name:"Competidores",active:false},
          {n:3,label:"Paso 3 · Pendiente",name:"Radar de Precios",active:false},
        ].map((s,i,arr) => (
          <div key={s.n} style={{display:"flex",alignItems:"center",gap:12,flex:1,position:"relative",paddingRight:i<arr.length-1?24:0}}>
            {i<arr.length-1 && <div style={{position:"absolute",right:0,top:"50%",transform:"translateY(-50%)",width:1,height:28,background:"var(--border)"}}/>}
            <div style={{
              width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
              flexShrink:0,fontSize:13,fontWeight:600,
              background:s.active?"var(--cyan-soft)":"rgba(60,70,100,0.3)",
              border:s.active?"1px solid rgba(34,211,238,0.5)":"1px solid var(--border)",
              color:s.active?"var(--cyan)":"var(--text-3)",
              boxShadow:s.active?"0 0 20px -4px rgba(34,211,238,0.5)":"none",
            }}>{s.active?<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 7H4a2 2 0 0 0-2 2v6c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>:s.n}</div>
            <div>
              <div style={{fontSize:11,fontWeight:500,color:s.active?"var(--text-2)":"var(--text-3)"}}>{s.label}</div>
              <div style={{fontSize:13,fontWeight:600,letterSpacing:"-0.01em",color:s.active?"var(--text-1)":"var(--text-3)"}}>{s.name}</div>
            </div>
          </div>
        ))}
      </div>

      {/* ── PLAN CARD ── */}
      <MpPlanCard saved={savedCount} limit={MP_CONFIG.limiteProductos} categorias={MP_CONFIG.categoriasHabilitadas} retailers={MP_CONFIG.retailersHabilitados} competidores={MP_CONFIG.competidoresPorProducto} />

              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

            </div>
            <span style={{fontFamily:"var(--font-mono)",fontSize:9.5,letterSpacing:"0.14em",textTransform:"uppercase",color:"var(--text-3)"}}>Cat. <span style={{color:"var(--cyan)"}}>Limpieza</span></span>

          <div style={{

              <span className="badge green" style={{fontSize:10}}>{savedCount} / {MP_CONFIG.limiteProductos}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:340,overflowY:"auto"}}>
              {savedCount===0 ? (
                <div style={{padding:"28px 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:10,textAlign:"center"}}>
                  <div style={{fontSize:28,opacity:0.35}}>📦</div>
                  <p style={{margin:0,fontSize:12,color:"var(--text-3)",lineHeight:1.6}}>Todavía no agregaste productos propios.<br/>Buscá tu marca o EAN para comenzar.</p>
                </div>
              ) : guardados.map(p => (
                <MpSavedItem key={p.id} p={p} onRemove={removerGuardado} />
              ))}
            </div>
          </div>

          {/* Next step */}
          {savedCount>0 && (
            <div className="card" style={{
              padding:18, border:"1px solid rgba(74,222,128,0.25)",
              background:"linear-gradient(135deg,rgba(74,222,128,0.05),rgba(34,211,238,0.04))",
              position:"relative", overflow:"hidden",
            }}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:"linear-gradient(90deg,transparent,rgba(74,222,128,0.5),transparent)"}}/>
              <div style={{marginBottom:8}}>
                <span className="badge green" style={{fontSize:10}}>
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                  Paso 1 completado
                </span>
              </div>
              <div style={{fontSize:13,fontWeight:600,letterSpacing:"-0.01em",marginBottom:6}}>Siguiente: Competidores directos</div>
              <p style={{margin:"0 0 12px",fontSize:12,color:"var(--text-3)",lineHeight:1.5}}>Definí quiénes son tus competidores por producto para activar el análisis competitivo.</p>
              <button className="btn primary" style={{width:"100%",justifyContent:"center"}}
                onClick={()=>showToast("Módulo Competidores próximamente.","info")}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                Ir a Competidores →
              </button>
            </div>
          )}
        </div>
      </div>

      {/* ── STICKY ACTION BAR ── */}
      <div style={{
        position:"fixed", bottom:24, left:"50%", transform:`translateX(-50%) translateY(${selCount>0?0:20}px)`,
        zIndex:200, display:"flex", alignItems:"center", gap:12, padding:"13px 18px",
        borderRadius:16, border:"1px solid rgba(34,211,238,0.35)",
        background:"rgba(8,12,24,0.94)", backdropFilter:"blur(24px)",
        boxShadow:"0 0 0 1px rgba(34,211,238,0.12),0 32px 80px -20px rgba(0,0,0,0.9),0 0 60px -20px rgba(34,211,238,0.3)",
        transition:"all 320ms cubic-bezier(0.22,1,0.36,1)",
        opacity:selCount>0?1:0, pointerEvents:selCount>0?"auto":"none",
        minWidth:400,
      }}>
        <div style={{width:30,height:30,borderRadius:8,background:"var(--cyan-soft)",border:"1px solid rgba(34,211,238,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"var(--cyan)",fontVariantNumeric:"tabular-nums"}}>{selCount}</div>
        <div style={{flex:1,fontSize:13,color:"var(--text-2)"}}>producto{selCount!==1?"s":""} <span style={{color:"var(--text-1)",fontWeight:500}}>seleccionado{selCount!==1?"s":""}</span></div>
        <div style={{width:1,height:28,background:"var(--border)"}}/>
        <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:atLimit?"var(--amber)":"var(--text-3)",whiteSpace:"nowrap"}}>{MP_CONFIG.limiteProductos-savedCount} disponibles</div>
        <button disabled={selCount===0||agregando||atLimit} onClick={agregarSeleccionados}
          style={{
            display:"flex",alignItems:"center",gap:8,padding:"9px 16px",
            borderRadius:11,border:"1px solid rgba(34,211,238,0.45)",
            background:"linear-gradient(180deg,rgba(34,211,238,0.22),rgba(96,165,250,0.14))",
            color:"#d8f7ff",font:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",
            boxShadow:"0 8px 24px -8px rgba(34,211,238,0.4)",
            transition:"all 180ms ease",whiteSpace:"nowrap",
            opacity:selCount===0||atLimit?0.35:1,
          }}>
          {agregando ? <div style={{width:13,height:13,border:"2px solid rgba(255,255,255,0.2)",borderTopColor:"currentColor",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/> : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>}
          Agregar a Mis Productos
        </button>
      </div>
    </div>
  );
}

window.MisProductosModule = MisProductosModule;
  </script>
